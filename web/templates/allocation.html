{% extends "base.html" %}

{% block title %}Alocação de Trabalho - ContaVias{% endblock %}

{% block page_title %}📦 Alocação e Matriz de Trabalho{% endblock %}

{% block content %}
<div class="w-full flex flex-col min-h-0 bg-white shadow-sm border border-gray-200 rounded-xl p-6">
        
        <div class="flex justify-between items-end mb-6 shrink-0 border-b border-gray-200 pb-0">
            <div class="flex gap-6 px-2">
                <button onclick="mudarAbaAlocacao('andamento')" id="btn-aba-pendente" class="text-lg font-bold pb-3 border-b-2 border-indigo-600 text-indigo-800 transition hover:text-indigo-600">
                    Pendentes
                </button>
                <button onclick="mudarAbaAlocacao('concluidos')" id="btn-aba-andamento" class="text-lg font-bold pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition">
                    Em Andamento
                </button>
            </div>
            </div>

        <div id="painel-criacao" class="bg-gray-50 border border-gray-200 p-4 rounded-lg shadow-inner mb-6 flex flex-col lg:flex-row gap-4 items-end shrink-0">
            <div class="flex-grow w-full max-w-md">
                <label class="block text-xs font-bold text-gray-700 mb-1.5">Nome do Lote (Opcional):</label>
                <input type="text" id="packageName" placeholder="Deixe em branco p/ agrupamento automático" class="w-full p-2.5 border border-gray-300 rounded text-sm focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none shadow-sm bg-white">
            </div>
            <div class="flex-grow w-full max-w-md">
                <label class="block text-xs font-bold text-gray-700 mb-1.5">Atribuir a (Freelancer):</label>
                <select id="globalFreelaSelect" class="w-full p-2.5 border border-gray-300 rounded text-sm focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none shadow-sm bg-white cursor-pointer">
                    <option value="">👤 Carregando equipe...</option>
                </select>
            </div>
            <button onclick="criarPacote()" id="btnCriarPacote" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-8 rounded-lg transition shadow-md whitespace-nowrap h-[42px] disabled:opacity-50 disabled:cursor-not-allowed">
                Criar e Atribuir (0)
            </button>
        </div>

        <div class="flex-grow overflow-y-auto space-y-4 pr-2 relative">
            <div id="container-pendentes" class="space-y-4">
                <div class="flex items-center justify-center h-40">
                    <p class="text-gray-500 flex items-center gap-2">
                        <span class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></span>
                        Carregando matriz de vídeos...
                    </p>
                </div>
            </div>
            
            <div id="container-andamento" class="space-y-4 hidden">
                </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    // As memórias e lógica de Checkbox continuam rigorosamente iguais!
    const tarefasSelecionadas = new Set();
    const togglesSelecionados = new Set();
    const projetosColapsados = new Set();
    const projetosJaVistos = new Set();

    function formatarTempo(segundos) {
        if (segundos === 0) return "Completo";
        const h = Math.floor(segundos / 3600).toString().padStart(2, '0');
        const m = Math.floor((segundos % 3600) / 60).toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function toggleOrigemLinha(sliceId, origem, isChecked) {
        const checkboxes = document.querySelectorAll(`.task-checkbox-${sliceId}[data-origin="${origem}"][data-assigned="false"]`);
        checkboxes.forEach(cb => { cb.checked = isChecked; atualizarStateCheckbox(parseInt(cb.value), isChecked); });
    }

    function toggleVideoInteiro(videoId, isChecked) {
        const checkboxes = document.querySelectorAll(`input[type="checkbox"][data-video="${videoId}"][data-assigned="false"]`);
        checkboxes.forEach(cb => { cb.checked = isChecked; atualizarStateCheckbox(parseInt(cb.value), isChecked); });
    }

    function toggleProjetoInteiro(projetoId, isChecked) {
        const checkboxes = document.querySelectorAll(`input[type="checkbox"][data-project="${projetoId}"][data-assigned="false"]`);
        checkboxes.forEach(cb => { cb.checked = isChecked; atualizarStateCheckbox(parseInt(cb.value), isChecked); });
    }

    function tratarSelecaoTarefa(checkbox, taskId) {
        const isAssigned = checkbox.getAttribute('data-assigned') === "true";
        const freelaName = checkbox.getAttribute('data-freela');

        if (checkbox.checked && isAssigned) {
            const fName = (freelaName && freelaName !== "null" && freelaName.trim() !== "") ? freelaName : "outro freelancer";
            if (!confirm(`⚠️ REALOCAÇÃO:\n\nEsta tarefa já está alocada para [ ${fName} ].\n\nDeseja retirar o acesso e selecioná-la para um novo pacote?`)) {
                checkbox.checked = false; 
                return;
            }
        }
        atualizarStateCheckbox(taskId, checkbox.checked);
    }

    function toggleProjeto(safeName) {
        const div = document.getElementById(`content_${safeName}`);
        const icon = document.getElementById(`icon_${safeName}`);
        if (projetosColapsados.has(safeName)) {
            projetosColapsados.delete(safeName); div.classList.remove('hidden'); icon.innerText = '▼';
        } else {
            projetosColapsados.add(safeName); div.classList.add('hidden'); icon.innerText = '▶';
        }
    }

    function atualizarStateCheckbox(taskId, isChecked) {
        if (isChecked) tarefasSelecionadas.add(taskId); else tarefasSelecionadas.delete(taskId);
        document.getElementById('btnCriarPacote').innerText = `Criar e Atribuir (${tarefasSelecionadas.size})`;
    }

    function atualizarStateToggle(toggleId, isChecked) {
        if (isChecked) togglesSelecionados.add(toggleId); else togglesSelecionados.delete(toggleId);
    }

    function popularDropdownFreelas(freelas) {
        const selectGlobal = document.getElementById('globalFreelaSelect');
        const selectedValue = selectGlobal.value; 

        if (freelas.length === 0) { 
            selectGlobal.innerHTML = '<option value="">Sem freelancers disponíveis</option>'; return; 
        }
        selectGlobal.innerHTML = '<option value="">👤 Selecione um freela...</option>' + 
            freelas.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        selectGlobal.value = selectedValue; 
    }

    async function carregarDados() {
        try {
            const response = await fetch('/allocation/data');
            if (!response.ok) throw new Error("Erro ao buscar dados do servidor");
            
            const data = await response.json();
            
            if (data.freelancers) {
                popularDropdownFreelas(data.freelancers); // Atualiza só o dropdown
            }
            
            // 🔴 SOLUÇÃO: Apenas passa os dados para a matriz, mesmo se estiver vazio.
            // A sua função renderizarMatriz já sabe preencher o HTML com "Nenhum projeto..."
            renderizarMatriz(data.videos || []);
            
        } catch (error) { 
            console.error(error);
            // Se der erro de internet/servidor, mostramos no container correto:
            const containerAndamento = document.getElementById('container-pendentes');
            if (containerAndamento) {
                containerAndamento.innerHTML = `<div class="text-center py-10 text-red-500 font-bold bg-red-50 rounded border border-red-200">Erro técnico: ${error.message}</div>`;
            }
        }
    }

    // --- NOVA FUNÇÃO DE ABAS ---
    function mudarAbaAlocacao(aba) {
        const btnAndamento = document.getElementById('btn-aba-pendente');
        const btnConcluidos = document.getElementById('btn-aba-andamento');
        const containerAndamento = document.getElementById('container-pendentes');
        const containerConcluidos = document.getElementById('container-andamento');
        const painelCriacao = document.getElementById('painel-criacao'); // <-- Capturamos o painel

        if (aba === 'andamento') {
            btnAndamento.className = "text-base md:text-lg font-bold pb-3 border-b-2 border-indigo-600 text-indigo-800 transition hover:text-indigo-600 whitespace-nowrap";
            btnConcluidos.className = "text-base md:text-lg font-bold pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition whitespace-nowrap";
            
            containerAndamento.classList.remove('hidden');
            containerConcluidos.classList.add('hidden');
            
            // Mostra o painel de criação
            painelCriacao.classList.remove('hidden');
            painelCriacao.classList.add('flex');
        } else {
            btnConcluidos.className = "text-base md:text-lg font-bold pb-3 border-b-2 border-indigo-600 text-indigo-800 transition hover:text-indigo-600 whitespace-nowrap";
            btnAndamento.className = "text-base md:text-lg font-bold pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition whitespace-nowrap";
            
            containerConcluidos.classList.remove('hidden');
            containerAndamento.classList.add('hidden');
            
            // Esconde o painel de criação
            painelCriacao.classList.remove('flex');
            painelCriacao.classList.add('hidden');
        }
    }

    // --- ATUALIZAÇÃO DA RENDERIZAÇÃO DA MATRIZ ---
    function renderizarMatriz(videos) {
        // 🔴 Pega os novos IDs que você colocou no HTML
        const containerPendentes = document.getElementById('container-pendentes');
        const containerAndamento = document.getElementById('container-andamento');
        
        // 1. Criamos os dois novos baldes hierárquicos
        const hierarquiaPendentes = {};
        const hierarquiaAndamento = {};

        videos.forEach(video => {
            const cName = video.client_name || "Sem Cliente";
            const pName = video.project_name || "Sem Projeto";

            if (video.slices) {
                video.slices.forEach(slice => {
                    if (slice.tasks) {
                        slice.tasks.forEach(t => {
                            // 🔴 A NOVA REGRA DE OURO: É pendente se o status for "pending"
                            const isPendente = t.status === 'pending' || t.status === 'SliceStatus.pending';
                            
                            // Define qual balde vai receber a tarefa
                            const hierarquiaAlvo = isPendente ? hierarquiaPendentes : hierarquiaAndamento;

                            if (!hierarquiaAlvo[cName]) hierarquiaAlvo[cName] = {};
                            if (!hierarquiaAlvo[cName][pName]) {
                                hierarquiaAlvo[cName][pName] = { 
                                    slicesMap: {}, 
                                    count: 0, 
                                    projectId: video.project_id || pName 
                                };
                            }

                            if (!hierarquiaAlvo[cName][pName].slicesMap[slice.id]) {
                                hierarquiaAlvo[cName][pName].slicesMap[slice.id] = {
                                    ...slice,
                                    filename: video.filename,
                                    videoId: video.id,
                                    tasks: []
                                };
                            }

                            hierarquiaAlvo[cName][pName].slicesMap[slice.id].tasks.push(t);
                            hierarquiaAlvo[cName][pName].count++; // Conta o total de tarefas neste bloco
                        });
                    }
                });
            }
        });

        // Função auxiliar para gerar o HTML de cada bloco
        function gerarHtmlEstrutura(hierarquia, tipo) {
            let htmlFinal = '';
            
            for (const [cliente, projetos] of Object.entries(hierarquia)) {
                let htmlCliente = `<div class="mb-8"><div class="flex items-center gap-2 mb-3 px-1"><span class="text-xs font-black bg-slate-200 text-slate-600 px-2 py-0.5 rounded uppercase tracking-widest">🏢 Cliente</span><h2 class="text-lg font-black text-slate-800">${cliente}</h2></div>`;
                let temProjetoNoCliente = false;

                for (const [pName, projData] of Object.entries(projetos)) {
                    const fatias = Object.values(projData.slicesMap);
                    fatias.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
                    
                    const safeId = pName.replace(/[^a-zA-Z0-9]/g, '_') + '_' + tipo;

                    if (!projetosJaVistos.has(safeId)) { projetosColapsados.add(safeId); projetosJaVistos.add(safeId); }
                    const isColapsado = projetosColapsados.has(safeId);
                    const displayClass = isColapsado ? 'hidden' : '';
                    const icone = isColapsado ? '▶' : '▼';

                    // 🔴 Ajuste do selinho de notificação (badge) dependendo da aba
                    let badgeStatus = tipo === 'pendentes' 
                        ? `<span class="text-[10px] bg-amber-500 text-amber-950 px-2.5 py-1 rounded-full shadow-sm font-black border border-amber-400 animate-pulse-subtle">${projData.count} Pendentes</span>`
                        : `<span class="text-[10px] bg-blue-500 text-white px-2.5 py-1 rounded-full shadow-sm font-black border border-blue-400">${projData.count} Alocadas</span>`;

                    let slicesHtml = '<div class="divide-y divide-gray-100">';
                    fatias.forEach(slice => {
                        const tasksPorOrigem = {};
                        if (slice.tasks) slice.tasks.forEach(t => {
                            const origem = (t.movement_name || "Movimento").split(' ➔ ')[0];
                            if (!tasksPorOrigem[origem]) tasksPorOrigem[origem] = [];
                            tasksPorOrigem[origem].push(t);
                        });

                        let tasksHtml = '<div class="flex flex-col gap-1.5 mt-2 w-full">';
                        for (const [origem, originTasks] of Object.entries(tasksPorOrigem)) {
                            tasksHtml += `<div class="flex flex-row items-stretch justify-between w-full border border-gray-200 rounded-md bg-gray-50 overflow-hidden shadow-sm"><div class="flex flex-wrap p-1 gap-1.5 flex-grow">`;
                            originTasks.forEach(t => {
                                const isConcluido = t.status === 'completed' || t.status === 'SliceStatus.completed';
                                const isAtribuido = (t.freelancer_name && t.freelancer_name.trim() !== "") || (t.status !== 'pending' && t.status !== 'SliceStatus.pending');
                                
                                let corFundo = isConcluido ? 'bg-emerald-100 border-emerald-400 text-emerald-900 font-black shadow-inner opacity-90' : (isAtribuido ? 'bg-indigo-100 border-indigo-300 text-indigo-900 opacity-60 hover:bg-red-50 hover:border-red-400' : 'bg-white border-gray-300 text-gray-600 hover:bg-indigo-50 hover:border-indigo-300');
                                let freelaDisplay = t.freelancer_name ? (t.freelancer_name.split(' ').length > 1 ? `👤 ${t.freelancer_name.split(' ')[0]} ${t.freelancer_name.split(' ').slice(-1)[0].charAt(0)}.` : `👤 ${t.freelancer_name}`) : "-";
                                const checkedAttr = tarefasSelecionadas.has(t.id) ? 'checked' : '';
                                
                                tasksHtml += `<label class="cursor-pointer border rounded p-0.5 text-[10px] font-bold transition flex flex-col items-center justify-center w-[75px] shrink-0 shadow-sm ${corFundo}"><div class="flex items-center justify-center w-full"><input type="checkbox" data-project="${safeId}" data-video="${slice.videoId}" data-origin="${origem}" data-assigned="${isAtribuido}" data-freela="${t.freelancer_name || ''}" class="task-checkbox-${slice.id} h-3 w-3 text-indigo-600 rounded mr-1 cursor-pointer" value="${t.id}" ${checkedAttr} onchange="tratarSelecaoTarefa(this, ${t.id})"><span class="truncate text-center" title="${t.movement_name}">${t.movement_name}</span></div><span class="text-[9px] font-normal truncate w-full text-center mt-0.5">${isConcluido?'✅ ':''}${freelaDisplay}</span></label>`;
                            });
                            tasksHtml += `</div><div class="flex items-center justify-center bg-gray-200 border-l border-gray-300 px-4 min-w-[80px] transition"><label class="cursor-pointer flex items-center justify-center w-full h-full text-xs font-bold text-gray-700 hover:text-indigo-800"><input type="checkbox" onchange="toggleOrigemLinha(${slice.id}, '${origem.replace(/'/g, "\\'")}', this.checked); atualizarStateToggle(this.id, this.checked)" class="h-4 w-4 text-indigo-600 rounded cursor-pointer mr-1.5">${origem} ➔</label></div></div>`;
                        }
                        tasksHtml += '</div>';
                        
                        const tempoCorte = `${formatarTempo(slice.start_time || 0)} a ${formatarTempo(slice.end_time || 0)}`;
                        let textoAmarelo = (!slice.name || slice.name === "Vídeo Completo" || slice.name.trim() === "") ? tempoCorte : slice.name;
                        
                        slicesHtml += `<div class="p-4 hover:bg-gray-50 transition flex flex-col gap-2 border-b border-gray-100 last:border-0"><div class="flex flex-col lg:flex-row justify-between items-start lg:items-center pb-2 gap-3"><div class="flex items-center gap-3 flex-wrap min-w-0"><input type="checkbox" onchange="toggleVideoInteiro(${slice.videoId}, this.checked)" class="h-4 w-4 text-indigo-600 rounded cursor-pointer transition shadow-sm"><span class="text-sm font-bold text-gray-800 bg-yellow-100 px-2.5 py-1 rounded border border-yellow-300 shadow-sm shrink-0">🕒 ${textoAmarelo}</span><span class="text-xs text-gray-500 font-mono truncate max-w-[250px] lg:max-w-[500px]">📁 ${slice.filename}</span></div><button onclick="reverterVideo(${slice.videoId})" class="bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border border-red-200 hover:border-red-500 px-3 py-1 rounded text-[10px] font-bold transition-colors shadow-sm shrink-0 flex items-center">↩️ Devolver para Staging</button></div>${tasksHtml}</div>`;
                    });
                    slicesHtml += '</div>';

                    htmlCliente += `
                        <div class="mb-4 bg-white border border-gray-300 rounded-lg shadow-sm overflow-hidden ml-4">
                            <div class="bg-slate-800 hover:bg-slate-700 cursor-pointer px-5 py-3 text-white font-bold flex justify-between items-center transition" onclick="toggleProjeto('${safeId}')">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" onclick="event.stopPropagation()" onchange="toggleProjetoInteiro('${safeId}', this.checked)" class="h-5 w-5 text-indigo-500 rounded cursor-pointer transition shadow-sm">
                                    <span class="text-base tracking-wide">📁 ${pName}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] bg-indigo-500 text-white px-3 py-1 rounded-full shadow-sm border border-indigo-400">${fatias.length} Fatias</span>
                                    ${badgeStatus}
                                    <span id="icon_${safeId}" class="text-gray-300 text-sm ml-2">${icone}</span>
                                </div>
                            </div>
                            <div id="content_${safeId}" class="p-0 ${displayClass} bg-white">${slicesHtml}</div>
                        </div>
                    `;
                    temProjetoNoCliente = true;
                }

                htmlCliente += "</div>";
                if (temProjetoNoCliente) htmlFinal += htmlCliente;
            }
            return htmlFinal;
        }

        // 3. Renderiza os dois blocos
        const htmlPendentes = gerarHtmlEstrutura(hierarquiaPendentes, 'pendentes');
        const htmlAndamento = gerarHtmlEstrutura(hierarquiaAndamento, 'andamento');

        // 4. Injeta os resultados com mensagens vazias apropriadas
        if (containerPendentes) {
            containerPendentes.innerHTML = htmlPendentes || '<div class="text-center py-10 text-gray-500 bg-gray-50 rounded border border-dashed border-gray-300">Nenhuma tarefa pendente para alocação.</div>';
        }
        
        if (containerAndamento) {
            containerAndamento.innerHTML = htmlAndamento || '<div class="text-center py-10 text-gray-500 bg-gray-50 rounded border border-dashed border-gray-300">Nenhuma tarefa em andamento no momento.</div>';
        }
    }

    async function criarPacote() {
        const packageName = document.getElementById('packageName').value.trim();
        const freelaId = document.getElementById('globalFreelaSelect').value;

        if (tarefasSelecionadas.size === 0) return alert("Selecione pelo menos um movimento marcando as caixas abaixo.");
        if (!freelaId) return alert("Selecione um Freelancer.");

        const payload = { name: packageName, freelancer_id: parseInt(freelaId), task_ids: Array.from(tarefasSelecionadas) };
        const btn = document.getElementById('btnCriarPacote');
        btn.innerText = "⏳ Atribuindo..."; btn.disabled = true;

        try {
            const response = await fetch('/api/admin/work-packages', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (response.ok) {
                const resData = await response.json(); alert(`✅ ${resData.message}`); 
                document.getElementById('packageName').value = ''; document.getElementById('globalFreelaSelect').value = '';
                tarefasSelecionadas.clear(); togglesSelecionados.clear(); carregarDados();
            } else { 
                const err = await response.json(); alert("Erro ao atribuir lote: " + (err.detail || "Falha no servidor.")); 
            }
        } catch (error) { alert("Falha de conexão com o servidor."); } 
        finally { btn.disabled = false; btn.innerText = `Criar e Atribuir (${tarefasSelecionadas.size})`; }
    }
    
    async function reverterVideo(videoId) {
        if (!confirm("⚠️ Tem certeza que deseja devolver este vídeo para o Staging? Todas as tarefas e fatias atuais serão apagadas.")) return;
        const response = await fetch(`/videos/${videoId}/revert`, { method: 'PATCH' });
        if (response.ok) carregarDados(); else alert("Erro ao reverter o vídeo.");
    }

    document.addEventListener('DOMContentLoaded', () => { carregarDados(); setInterval(carregarDados, 10000); });
</script>
{% endblock %}
