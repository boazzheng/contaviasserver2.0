{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <p class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-1">Staging</p>
        <div class="flex items-center justify-between">
            <h3 class="text-3xl font-black text-slate-800" id="dash-staged">0</h3>
            <span class="text-2xl">📥</span>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <p class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-1">Em Alocação</p>
        <div class="flex items-center justify-between">
            <h3 class="text-3xl font-black text-indigo-600" id="dash-allocated">0</h3>
            <span class="text-2xl">📦</span>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <p class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-1">Para Auditoria</p>
        <div class="flex items-center justify-between">
            <h3 class="text-3xl font-black text-amber-600" id="dash-audit">0</h3>
            <span class="text-2xl">⚖️</span>
        </div>
    </div>
</div>

<h2 class="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">
    <span>🛤️ Pipeline de Produção</span>
</h2>

<div class="flex gap-6 overflow-x-auto pb-6">
    <div class="w-80 shrink-0">
        <div class="bg-slate-200 p-3 rounded-t-lg font-bold text-xs text-slate-600 uppercase">1. Preparação</div>
        <div id="kanban-staging" class="bg-slate-100/50 border-x border-b border-slate-200 p-3 rounded-b-lg space-y-3 min-h-[300px]"></div>
    </div>

    <div class="w-80 shrink-0">
        <div class="bg-indigo-100 p-3 rounded-t-lg font-bold text-xs text-indigo-700 uppercase">2. Em Contagem</div>
        <div id="kanban-allocation" class="bg-indigo-50/30 border-x border-b border-indigo-100 p-3 rounded-b-lg space-y-3 min-h-[300px]"></div>
    </div>

    <div class="w-80 shrink-0">
        <div class="bg-emerald-100 p-3 rounded-t-lg font-bold text-xs text-emerald-700 uppercase">3. Pronto p/ Auditoria</div>
        <div id="kanban-completed" class="bg-emerald-50/30 border-x border-b border-emerald-100 p-3 rounded-b-lg space-y-3 min-h-[300px]"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function carregarDashboard() {
        const res = await fetch('/api/admin/kanban-data');
        const projetos = await res.json();
        
        const containers = {
            staging: document.getElementById('kanban-staging'),
            allocation: document.getElementById('kanban-allocation'),
            completed: document.getElementById('kanban-completed')
        };

        Object.values(containers).forEach(c => c.innerHTML = '');

        projetos.forEach(p => {
            const card = `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition cursor-pointer" onclick="location.href='/admin/reports'">
                    <p class="text-[10px] font-black text-indigo-500 uppercase mb-1">${p.client}</p>
                    <h4 class="font-bold text-slate-800 text-sm mb-3">${p.name}</h4>
                    <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 mb-1">
                        <span>Progresso Humano</span>
                        <span>${p.percent}%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-indigo-500 h-full transition-all duration-500" style="width: ${p.percent}%"></div>
                    </div>
                    <p class="text-[9px] text-slate-400 mt-2 italic">${p.progress} movimentos validados</p>
                </div>
            `;
            if (containers[p.stage]) containers[p.stage].innerHTML += card;
        });

        // Aproveita e atualiza os números dos cards superiores usando a outra API que já temos
        const resStats = await fetch('/api/admin/sidebar-stats');
        const stats = await resStats.json();
        document.getElementById('dash-staged').innerText = stats.staging;
        document.getElementById('dash-allocated').innerText = stats.allocation;
        document.getElementById('dash-audit').innerText = stats.audit;
    }

    document.addEventListener('DOMContentLoaded', carregarDashboard);
</script>
{% endblock %}
