{% extends "base.html" %}

{% block title %}Gestão da Equipe - ContaVias{% endblock %}

{% block page_title %}🧑‍💻 Gestão de Freelancers{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full min-h-[600px]">

    <div class="lg:col-span-1 flex flex-col gap-6 shrink-0">
        <div class="bg-white shadow-sm border border-gray-200 rounded-xl p-6 border-t-4 border-t-indigo-500">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>➕</span> Novo Freelancer
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Nome Completo</label>
                    <input type="text" id="freelaName" placeholder="Ex: João Silva" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">E-mail de Acesso</label>
                    <input type="email" id="freelaEmail" placeholder="joao@email.com" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition">
                </div>
                <button onclick="cadastrarFreela()" id="btnCadastrar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg shadow-sm transition mt-2">
                    Cadastrar na Equipe
                </button>
            </div>
        </div>
    </div>

    <div class="lg:col-span-2 flex flex-col min-h-0 bg-white shadow-sm border border-gray-200 rounded-xl p-6">
        <div class="flex justify-between items-center mb-6 shrink-0 border-b border-gray-100 pb-4">
            <h2 class="text-xl font-bold text-gray-800">📋 Equipe Ativa</h2>
            <span class="text-xs bg-green-50 text-green-700 font-bold px-3 py-1.5 rounded-full border border-green-200" id="totalFreelas">0 Membros</span>
        </div>

        <div class="flex-grow overflow-y-auto pr-2">
            <ul id="listaFreelas" class="space-y-3">
                <li class="italic text-gray-400 text-center py-10">Carregando equipe...</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function carregarEquipe() {
        try {
            // Reutilizamos a rota de alocação por enquanto para puxar os freelas
            const response = await fetch('/allocation/data'); 
            const data = await response.json();
            const freelas = data.freelancers;
            
            document.getElementById('totalFreelas').innerText = `${freelas.length} Membros`;
            const ul = document.getElementById('listaFreelas');
            
            if (freelas.length === 0) { 
                ul.innerHTML = '<li class="italic text-gray-400 text-center py-10">Nenhum freelancer cadastrado ainda.</li>'; 
                return; 
            }
            
            ul.innerHTML = freelas.map(f => `
                <li class="flex items-center justify-between p-4 bg-gray-50 border border-gray-100 rounded-lg hover:bg-indigo-50 hover:border-indigo-100 transition group">
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 rounded-full bg-indigo-200 text-indigo-800 font-bold flex items-center justify-center text-lg shadow-sm">
                            ${f.name.charAt(0).toUpperCase()}
                        </span>
                        <div>
                            <p class="font-bold text-gray-800">${f.name}</p>
                            <p class="text-xs text-gray-500 font-mono">ID: #${f.id}</p>
                        </div>
                    </div>
                    <div class="text-xs text-gray-400 group-hover:text-indigo-500 transition">
                        Opções em breve ➔
                    </div>
                </li>
            `).join('');
            
        } catch (error) {
            console.error("Erro ao carregar equipe:", error);
        }
    }

    async function cadastrarFreela() {
        const name = document.getElementById('freelaName').value;
        const email = document.getElementById('freelaEmail').value;
        if (!name || !email) return alert("Preencha nome e e-mail.");
        
        const btn = document.getElementById('btnCadastrar');
        btn.innerText = "⏳ Cadastrando..."; btn.disabled = true;

        const response = await fetch('/users', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ name: name, email: email, role: "freelancer" }) 
        });
        
        if (response.ok) { 
            document.getElementById('freelaName').value = ''; 
            document.getElementById('freelaEmail').value = ''; 
            carregarEquipe(); 
        } else { 
            const err = await response.json(); 
            alert(err.detail || "Erro ao cadastrar."); 
        }
        
        btn.innerText = "Cadastrar na Equipe"; btn.disabled = false;
    }

    document.addEventListener('DOMContentLoaded', carregarEquipe);
</script>
{% endblock %}
