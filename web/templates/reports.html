<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatórios Consolidados - ContaVias</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <aside class="w-80 bg-gray-900 text-white flex flex-col shrink-0 border-r border-gray-700">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-xl font-bold">📊 Relatórios</h1>
            <p class="text-xs text-gray-400 mt-1">Consolidação por Ponto</p>
        </div>
        <div id="lista-projetos" class="flex-1 overflow-y-auto p-4 space-y-2">
            <p class="text-gray-500 text-sm italic">Carregando projetos...</p>
        </div>
        <div class="p-4 border-t border-gray-800">
            <button onclick="window.location.href='/admin/dashboard'" class="w-full text-left text-sm text-gray-400 hover:text-white transition">← Voltar ao Dashboard</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white">
        
        <header id="header-projeto" class="hidden p-6 border-b border-gray-200 flex justify-between items-center bg-white shadow-sm">
            <div>
                <h2 id="view-project-name" class="text-2xl font-bold text-gray-800">Selecione um Projeto</h2>
                <p id="view-client-name" class="text-sm text-gray-500"></p>
            </div>
            <button id="btn-export" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition flex items-center gap-2">
                📥 Exportar Excel (CSV)
            </button>
        </header>

        <div id="content-relatorio" class="flex-1 overflow-y-auto p-8">
            <div class="flex flex-col items-center justify-center h-full text-gray-400">
                <span class="text-6xl mb-4">📂</span>
                <p class="text-lg">Selecione um projeto na barra lateral para visualizar os dados consolidados.</p>
            </div>
        </div>
    </main>

    <script>
        let dadosAtuais = null;

        // 1. Carregar lista de projetos para a Sidebar
        async function carregarProjetos() {
            const res = await fetch('/projects'); // Rota que já deves ter para listar projetos
            const projetos = await res.json();
            const container = document.getElementById('lista-projetos');
            container.innerHTML = '';

            projetos.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 rounded-lg hover:bg-gray-800 transition text-sm font-medium border border-transparent hover:border-gray-700 group flex justify-between items-center";
                btn.onclick = () => carregarRelatorio(p.id);
                btn.innerHTML = `
                    <span>${p.name}</span>
                    <span class="text-[10px] bg-gray-700 px-2 py-0.5 rounded opacity-0 group-hover:opacity-100">Ver</span>
                `;
                container.appendChild(btn);
            });
        }

        // 2. Carregar os dados consolidados do projeto
        async function carregarRelatorio(projectId) {
            const content = document.getElementById('content-relatorio');
            content.innerHTML = '<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>';
            
            try {
                const res = await fetch(`/api/admin/reports/${projectId}`);
                dadosAtuais = await res.json();

                document.getElementById('header-projeto').classList.remove('hidden');
                document.getElementById('view-project-name').innerText = dadosAtuais.project_name;
                document.getElementById('view-client-name').innerText = "Cliente: " + dadosAtuais.client_name;

                renderizarTabela(dadosAtuais.data);
                
                document.getElementById('btn-export').onclick = () => exportarCSV(dadosAtuais);

            } catch (err) {
                content.innerHTML = `<p class="text-red-500">Erro ao carregar dados: ${err.message}</p>`;
            }
        }

        // 3. Renderizar a Tabela na Tela
        function renderizarTabela(linhas) {
            if (linhas.length === 0) {
                document.getElementById('content-relatorio').innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 p-6 rounded-lg text-yellow-700 text-center">
                        Nenhum dado concluído encontrado para este projeto. Certifique-se de que os freelancers clicaram em "Salvar e Concluir".
                    </div>`;
                return;
            }

            let html = `
                <table class="w-full text-left border-collapse bg-white shadow-sm rounded-lg overflow-hidden">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase text-gray-500 font-bold">
                            <th class="p-4">Vídeo</th>
                            <th class="p-4">Movimento</th>
                            <th class="p-4">Intervalo</th>
                            <th class="p-4 text-center">🚗</th>
                            <th class="p-4 text-center">🏍️</th>
                            <th class="p-4 text-center">🚌</th>
                            <th class="p-4 text-center">🚚</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
            `;

            linhas.forEach(row => {
                html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-medium text-gray-700">${row.video}</td>
                        <td class="p-4 text-gray-600">${row.movement}</td>
                        <td class="p-4 font-mono text-xs text-indigo-600 font-bold">${row.interval}</td>
                        <td class="p-4 text-center font-bold">${row.Carro}</td>
                        <td class="p-4 text-center font-bold">${row.Moto}</td>
                        <td class="p-4 text-center font-bold">${row["Ônibus"]}</td>
                        <td class="p-4 text-center font-bold">${row["Caminhão"]}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('content-relatorio').innerHTML = html;
        }

        // 4. Função de Exportação
        function exportarCSV(json) {
            let csv = "Vídeo;Movimento;Intervalo;Carros;Motos;Onibus;Caminhoes\n";
            json.data.forEach(r => {
                csv += `${r.video};${r.movement};${r.interval};${r.Carro};${r.Moto};${r["Ônibus"]};${r["Caminhão"]}\n`;
            });

            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Relatorio_${json.project_name.replace(/\s+/g, '_')}.csv`;
            link.click();
        }

        document.addEventListener('DOMContentLoaded', carregarProjetos);
    </script>
</body>
</html>
