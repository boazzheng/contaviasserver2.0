<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaVias - Fila de Staging</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-gray-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-white font-bold text-xl">🚦 ContaVias Admin 2.0</div>
            <div class="text-gray-300 text-sm">Operador de Dados</div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">Fila de Staging (Épico 1)</h1>
                <p class="text-gray-600">Vídeos recém-chegados aguardando configuração.</p>
            </div>
            <button onclick="limparFilaInteira()" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow transition duration-150">
                🗑️ Limpar Fila Inteira
            </button>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden overflow-x-auto">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ID</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Cliente</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Projeto</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Arquivo</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Localidade</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Upload</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-videos">
                    <tr><td colspan="8" class="text-center py-4 text-gray-500">Carregando dados da API...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Função para carregar a tabela (como já tínhamos)
        async function carregarFila() {
            try {
                const response = await fetch('/videos/staged');
                const data = await response.json();
                const tbody = document.getElementById('tabela-videos');
                tbody.innerHTML = ''; 

                if (data.videos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-gray-500">Nenhum vídeo na fila. O robô está vigiando... 👀</td></tr>';
                    return;
                }

                data.videos.forEach(video => {
                    const dataFormatada = new Date(video.upload_date).toLocaleString('pt-BR');
                    const nomeCliente = video.project?.client?.name || 'Cliente Desconhecido';
                    const nomeProjeto = video.project?.name || 'Projeto Desconhecido';
                    
                    const row = `
                        <tr>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm"><p class="text-gray-900 whitespace-no-wrap">${video.id}</p></td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm"><p class="text-gray-800 font-semibold whitespace-no-wrap">${nomeCliente}</p></td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm"><p class="text-gray-600 whitespace-no-wrap">${nomeProjeto}</p></td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                ${video.file_path.startsWith('http') 
                                    ? `<a href="${video.file_path}" target="_blank" class="text-blue-600 font-bold whitespace-no-wrap hover:underline">${video.original_filename} 🔗</a>`
                                    : `<p class="text-blue-600 font-bold whitespace-no-wrap">${video.original_filename}</p>`}
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm"><p class="text-gray-900 whitespace-no-wrap">${video.location_name}</p></td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm"><p class="text-gray-500 text-xs whitespace-no-wrap">${dataFormatada}</p></td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                                <span class="relative inline-block px-3 py-1 font-semibold text-yellow-900 leading-tight">
                                    <span aria-hidden class="absolute inset-0 bg-yellow-200 opacity-50 rounded-full"></span>
                                    <span class="relative">Staged</span>
                                </span>
                            </td>
                            <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center">
                                <div class="flex justify-center space-x-2">
                                    <button class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-1 px-3 rounded text-xs transition duration-150 shadow">
                                        Configurar
                                    </button>
                                    <button onclick="removerVideo(${video.id})" class="bg-red-100 hover:bg-red-200 text-red-700 font-bold py-1 px-3 rounded text-xs transition duration-150 shadow">
                                        X
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                document.getElementById('tabela-videos').innerHTML = '<tr><td colspan="8" class="text-center py-4 text-red-500">Erro ao conectar com o servidor.</td></tr>';
            }
        }

        // ==========================================
        // NOVAS FUNÇÕES DE EXCLUSÃO
        // ==========================================

        async function removerVideo(id) {
            // Pede confirmação para evitar cliques acidentais
            if (!confirm(`Tem certeza que deseja remover o vídeo #${id} da fila?`)) return;

            try {
                const response = await fetch(`/videos/staged/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    carregarFila(); // Recarrega a tabela se der certo
                } else {
                    alert('Erro ao tentar remover o vídeo.');
                }
            } catch (error) {
                console.error("Erro na requisição DELETE:", error);
            }
        }

        async function limparFilaInteira() {
            // Pede confirmação redobrada
            if (!confirm("⚠️ ATENÇÃO: Isso vai apagar TODOS os vídeos que estão aguardando na fila. Tem certeza absoluta?")) return;

            try {
                const response = await fetch('/videos/staged', { method: 'DELETE' });
                if (response.ok) {
                    carregarFila(); 
                } else {
                    alert('Erro ao tentar limpar a fila.');
                }
            } catch (error) {
                console.error("Erro na requisição DELETE:", error);
            }
        }

        // Carrega os dados quando entra na página
        document.addEventListener('DOMContentLoaded', carregarFila);
    </script>
</body>
</html>
